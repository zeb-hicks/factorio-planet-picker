[mod-setting-description]
planet-picker-modify-fulgora-ruins=Modifies the Fulgoran ruins to have a low chance of dropping Substations, Medium electric poles, and Accumulators to facilitate initial power generation with no tech.
planet-picker-modify-fulgora-ice=Adds Ice Melting recipe to the Fluid Handling technology to facilitate Fulgora start.
planet-picker-modify-fulgora-sulfur=Allows recycling small amounts of sulfur from batteries on Fulgora.
planet-picker-modify-gleba-centrifugation=Adds a new recipe for coal production on Gleba by processing bacteria in a chemical plant.
planet-picker-modify-gleba-landfill=Makes it possible to create biochambers before unlocking logistic science on Gleba.
planet-picker-modify-vulcanus-trees=Adds a small chance for Ashland trees on Vulcanus to drop Wood so that you can make Small electic poles before research is possible.
planet-picker-modify-vulcanus-plastic=Adds a plastic recipe for early Vulcanus. The recipe is less efficient than the normal recipe, but is necessary for reaching
planet-picker-modify-vulcanus-generator=Adds the __ITEM__thermal-vent__ structure to bootstrap power generation on Vulcanus, which otherwise has no method to generate power without research.
planet-picker-modify-vulcanus-mining=Midifies the mining hardness of Vulcanus rocks to make it slightly less awful to start there.
planet-picker-modded-planets=Planets that are automatically detected may not work well as a starter planet, if at all. Your mileage may vary.
